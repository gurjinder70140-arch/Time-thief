<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Thief</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="hud">
    <h2>⏳ Time Left: <span id="timer">300</span>s</h2>
    <h3>👾 Enemies: <span id="kills">0</span></h3>
</div>

<!-- Desktop Controls -->
<div id="controls">
    <h3>🎮 CONTROLS</h3>
    <p>Move: <strong>W A S D</strong></p>
    <p>Attack: <strong>SPACE</strong></p>
</div>

<!-- Mobile Touch Controls -->
<div id="mobileControls">
    <button id="btnUp" class="mobile-btn">↑</button>
    <div id="mobileRow">
        <button id="btnLeft" class="mobile-btn">←</button>
        <button id="btnDown" class="mobile-btn">↓</button>
        <button id="btnRight" class="mobile-btn">→</button>
    </div>
    <button id="btnAttack" class="mobile-btn mobile-btn-attack">⚔️ ATTACK</button>
</div>

<canvas id="game" width="900" height="600"></canvas>

<script src="game.js"></script>
<script src="mobile.js"></script>

</body>
</html>
